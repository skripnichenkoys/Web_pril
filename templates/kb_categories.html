{% extends "kb_base.html" %}
{% block content %}
<h2>Управление категориями</h2>
<table class="table">
    <thead>
        <tr><th>Название</th><th>Описание</th><th>Действия</th></tr>
    </thead>
    <tbody>
    {% for cat in categories %}
    <tr>
        <td>{{ cat.name }}</td>
        <td>{{ cat.description or '' }}</td>
        <td>
            <a href="{{ url_for('edit_category', id=cat.id) }}">✏️ Переименовать</a>
            <form action="{{ url_for('delete_category', id=cat.id) }}" method="post" style="display:inline;">
                <button type="submit" onclick="return confirm('Удалить категорию? Статьи не будут удалены.')">🗑️ Удалить</button>
            </form>
        </td>
    </tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
